<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>管理画面 | Project Library</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<header id="header"></header>

<main class="admin-container">

<h2>作品管理</h2>

<!-- ======================
登録フォーム
====================== -->

<form id="workForm">

<input type="hidden" id="editId">

<label>タイトル</label>

<input
type="text"
id="title"
placeholder="作品タイトル">

<label>PDFファイル</label>

<input
type="file"
id="pdf"
accept=".pdf">

<label>サムネイル画像</label>

<input
type="file"
id="thumbnail"
accept="image/*">

<div class="preview-box">

<div class="thumbnail-preview">

サムネイルプレビュー

</div>

</div>

<label>カテゴリ</label>

<div class="check-group">

<label>
<input
type="checkbox"
value="幼児向け">
幼児向け
</label>

<label>
<input
type="checkbox"
value="子ども向け">
子ども向け
</label>

<label>
<input
type="checkbox"
value="大人向け">
大人向け
</label>

<label>
<input
type="checkbox"
value="シニア・リハビリ">
シニア・リハビリ
</label>

</div>

<label>固定タグ</label>

<input
type="text"
id="fixedTags"
placeholder="ぬりえ・迷路・計算">

<label>自由タグ</label>

<input
type="text"
id="freeTags"
placeholder="消防車・夏・恐竜">

<label>シリーズ名</label>

<input
type="text"
id="series"
placeholder="働く車シリーズ">
