<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>管理画面 | Project Library</title>

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<header id="header"></header>

<main class="admin-container">

<h2>作品管理</h2>

<!-- ======================
登録フォーム
====================== -->

<form id="workForm">

<input type="hidden" id="editId">

<label>タイトル</label>

<input
type="text"
id="title"
placeholder="作品タイトル">

<label>PDFファイル</label>

<input
type="file"
id="pdf"
accept=".pdf">

<label>サムネイル画像</label>

<input
type="file"
id="thumbnail"
accept="image/*">

<div class="preview-box">

<div class="thumbnail-preview">

サムネイルプレビュー

</div>

</div>

<label>カテゴリ</label>

<div class="check-group">

<label>
<input
type="checkbox"
value="幼児向け">
幼児向け
</label>

<label>
<input
type="checkbox"
value="子ども向け">
子ども向け
</label>

<label>
<input
type="checkbox"
value="大人向け">
大人向け
</label>

<label>
<input
type="checkbox"
value="シニア・リハビリ">
シニア・リハビリ
</label>

</div>

<label>固定タグ</label>

<input
type="text"
id="fixedTags"
placeholder="ぬりえ・迷路・計算">

<label>自由タグ</label>

<input
type="text"
id="freeTags"
placeholder="消防車・夏・恐竜">

<label>シリーズ名</label>

<input
type="text"
id="series"
placeholder="働く車シリーズ">
<label>難易度</label>

<select id="difficulty">

<option value="1">★☆☆ 初級</option>
<option value="2">★★☆ 中級</option>
<option value="3">★★★ 上級</option>

</select>

<label>対象年齢</label>

<input
type="text"
id="age"
placeholder="3〜6歳">

<label>印刷サイズ</label>

<select id="size">

<option>A4</option>
<option>A3</option>

</select>

<label>必要な道具</label>

<input
type="text"
id="tools"
placeholder="色えんぴつ・はさみ">

<label>説明</label>

<textarea
id="description"
rows="6"
placeholder="作品説明を入力"></textarea>

</form>

<!-- ======================
操作ボタン
====================== -->

<div class="admin-bottom-bar">

<button
type="button"
class="draft">

下書き保存

</button>

<button
type="button"
class="publish">

公開する

</button>

</div>

<!-- ======================
登録済み作品
====================== -->

<section class="admin-list">

<h2>

登録済み作品

</h2>

<table class="admin-table">

<thead>

<tr>

<th>No</th>
<th>タイトル</th>
<th>カテゴリ</th>
<th>操作</th>

</tr>

</thead>

<tbody id="workList">

</tbody>

</table>

</section>
</main>

<footer id="footer"></footer>

<script src="assets/js/common.js"></script>

<script src="assets/data/works.js"></script>

<script src="assets/js/admin.js"></script>

</body>

</html>
