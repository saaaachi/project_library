<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>あたまのストレッチ プリント館</title>

<meta
name="description"
content="無料で印刷できる脳トレ・知育プリント。幼児からシニアまで楽しめるPDFを無料公開しています。">

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<header id="header"></header>

<div class="container">

    <aside id="sidebar"></aside>

    <main>

        <!-- ヒーロー -->

        <section class="hero">

            <h1>🧠 あたまのストレッチ プリント館</h1>

            <p class="hero-subtitle">

                無料で印刷できる脳トレ・知育プリント。<br>
                幼児からシニアまで楽しめるPDFを公開中。

            </p>

        </section>

        <!-- NEW -->

        <section class="home-section">

            <div class="section-title">

                <h2>🆕 新着プリント</h2>

                <a href="library.html">
                    一覧を見る →
                </a>

            </div>

            <div
                id="newArea"
                class="card-grid">
            </div>

            <p class="home-message">

                この図書館は少しずつ作品が増えています。<br>
                気に入っていただけたら、また遊びに来てください😊

            </p>

        </section>

        <!-- おすすめ -->

        <section class="home-section">

            <div class="section-title">

                <h2>⭐ おすすめ</h2>

            </div>

            <div
                id="recommendArea"
                class="card-grid">
            </div>

        </section>

        <!-- カテゴリ -->

        <section class="home-section">

            <div class="section-title">

                <h2>👶 カテゴリ別おすすめ</h2>

            </div>

            <div class="category-links">

                <a href="library.html?category=幼児向け">
                    幼児向け
                </a>

                <a href="library.html?category=子ども向け">
                    子ども向け
                </a>

                <a href="library.html?category=大人向け">
                    大人向け
                </a>

                <a href="library.html?category=シニア・リハビリ">
                    シニア・リハビリ
                </a>

            </div>

        </section>

        <!-- バナー -->

        <section class="banner-area">

            <a
                class="banner"
                href="#">

                🧠 毎日脳トレはこちら

            </a>

            <a
                class="banner"
                href="#">

                🛒 Etsyまとめ購入はこちら

            </a>

        </section>

    </main>

</div>

<footer id="footer"></footer>

<script src="assets/data/works.js"></script>

<script src="assets/js/common.js"></script>

<script src="assets/js/library.js"></script>

<script>

const newArea = document.getElementById("newArea");
const recommendArea = document.getElementById("recommendArea");

if(typeof works !== "undefined"){

    const newWorks =
        works.filter(work=>work.isNew).slice(0,2);

    const recommendWorks =
        works.filter(work=>work.recommend).slice(0,4);

    if(newArea){

        newArea.innerHTML =
            newWorks.map(createCard).join("");

    }

    if(recommendArea){

        recommendArea.innerHTML =
            recommendWorks.map(createCard).join("");

    }

}

</script>

</body>
</html>
